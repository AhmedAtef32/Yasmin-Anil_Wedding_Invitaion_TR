<div
  id="invitation"
  class="relative min-h-screen bg-[#faf8f5] overflow-hidden flex flex-col items-center justify-center p-6 sm:p-12 transition-opacity duration-1000 ease-in-out"
  [class.opacity-0]="state.isVideoPlaying()"
  [class.opacity-100]="!state.isVideoPlaying()"
  [class.pointer-events-none]="state.isVideoPlaying()"
>
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <ng-container *ngFor="let heart of hearts">
      <div
        class="absolute text-[#ebd197] opacity-60 animate-float-hearts"
        [style.left]="heart.left"
        [style.animationDelay]="heart.animationDelay"
        [style.animationDuration]="heart.animationDuration"
        [style.transform]="'scale(' + heart.scale + ')'"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 fill-current"
          viewBox="0 0 24 24"
        >
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          />
        </svg>
      </div>
    </ng-container>
  </div>
  <div
    class="z-10 bg-white/60 backdrop-blur-md p-8 md:p-16 rounded-3xl shadow-xl border border-gold-300 max-w-4xl w-full text-center animate-fade-in"
  >
    <div
      class="text-gold-500 mb-6 uppercase tracking-[0.3em] text-sm md:text-base font-serif"
    >
      Davetlisiniz
    </div>

    <div
      class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 my-10 font-arabic text-4xl md:text-6xl text-gold-700 animate-float"
    >
      <span>Anıl Serdar</span>
      <span class="text-2xl md:text-4xl text-gold-400 font-serif">&amp;</span>
      <span>Yasmin Ghattas</span>
    </div>

    <div class="w-24 h-px bg-gold-400 mx-auto my-10 opacity-50"></div>

    <div
      class="flex flex-col items-center justify-center gap-4 mb-12 font-serif text-gray-700"
    >
      <div class="text-xl md:text-2xl tracking-wider">Cuma</div>
      <div class="text-3xl md:text-5xl font-bold text-gold-600">
        17 Temmuz 2026
      </div>
      <div class="text-lg md:text-xl tracking-wide text-gold-500 mt-1">
        Cephanelik Butik Hotel, TRABZON
      </div>
      <div class="text-lg md:text-xl tracking-widest mt-2">19:00</div>
    </div>

    <div class="w-16 h-px bg-gold-400 mx-auto my-10 opacity-30"></div>

    <div class="my-10">
      <app-countdown></app-countdown>
    </div>

    <div class="mt-12">
      <button
        (click)="saveToCalendar()"
        class="bg-gold-600 hover:bg-gold-700 text-white font-serif tracking-widest uppercase text-sm px-8 py-4 rounded-full transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-gold-300"
      >
        Tarihi Kaydet
      </button>
    </div>
  </div>
</div>

<div
  class="flex items-center justify-center gap-3 sm:gap-4 mt-12 sm:mt-14 md:mt-16"
>
  <div
    class="flex-1 max-w-xs h-0.5 bg-gradient-to-r from-transparent via-gold-400 to-transparent opacity-40"
  ></div>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="h-4 w-4 sm:h-5 sm:w-5 text-gold-400 flex-shrink-0"
    fill="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
    />
  </svg>
  <div
    class="flex-1 max-w-xs h-0.5 bg-gradient-to-l from-transparent via-gold-400 to-transparent opacity-40"
  ></div>
</div>
